    <!-- Priority Dots -->
    <div class="priority-indicator">

        <span class="priority emergency"></span>

        <span class="priority important"></span>

        <span class="priority urgent"></span>

        <span class="priority norush"></span>

    </div>


    <!-- Popup Form -->
    <div class="form-overlay">

        <form class="note-form">

            <h2>New Call</h2>

            <input type="text" placeholder="Image URL" required class="image_url">

            <input type="text" placeholder="Full Name" required class="full_name">

            <input type="text" placeholder="Home Town" required class="home_town">

            <input type="text" placeholder="Purpose" required class="purpose">

            <div class="category">

                <label>
                    <input type="radio" name="priority" required value="Emergency">
                    Emergency
                </label>

                <label>
                    <input type="radio" name="priority" value="Important">
                    Important
                </label>

                <label>
                    <input type="radio" name="priority" value="Urgent">
                    Urgent
                </label>

                <label>
                    <input type="radio" name="priority" value="No Rush">
                    No Rush
                </label>

            </div>

            <button class="create-btn" type="button" >
                Create Note
            </button>

            <button class="close-btn" >
                Close
            </button>

        </form>

    </div>
